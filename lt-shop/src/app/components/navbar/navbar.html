<div class="navbar-top">
  <div class="nav-container top-links">
    <ng-container *ngIf="!(auth.currentUserSubject | async)">
      <a routerLink="/login"><i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ</a>
      <span class="divider">|</span>
      <a routerLink="/register"><i class="fas fa-user-plus"></i> สมัครสมาชิก</a>
    </ng-container>
    <ng-container *ngIf="auth.currentUserSubject | async as user">
      <span>ยินดีต้อนรับ <strong>{{ user.name }}</strong></span>
      <span class="divider">|</span>
      <!-- ✅ แสดงลิงก์ Admin เฉพาะ role = admin -->
      <ng-container *ngIf="user.role === 'admin'">
        <a routerLink="/admin/products" class="admin-link">⚙️ จัดการสินค้า</a>
        <span class="divider">|</span>
        <a routerLink="/admin/orders" class="admin-link">📋 จัดการออเดอร์</a>
        <span class="divider">|</span>
      </ng-container>
      <button (click)="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
    </ng-container>
  </div>
</div>

        <a routerLink="/category/psu" class="nav-item">PSU</a>
        <a routerLink="/category/case" class="nav-item">Case</a>
        <a routerLink="/category/liquid cooler" class="nav-item">Liquid Cooler</a>
        <a routerLink="/category/air cooler" class="nav-item">Air Cooler</a>
        <div class="nav-divider"></div>
