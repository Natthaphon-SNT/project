<div class="register-page">
  <div class="register-card fade-in">
    
    <div class="register-header">
      <h2>สร้างบัญชีใหม่</h2>
      <p>LT PC BUILD</p>
    </div>
    
    <div *ngIf="errorMessage" class="error-box">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onRegister()">
      <div class="input-group">
        <input type="text" [(ngModel)]="user.name" name="name" placeholder="ชื่อ-นามสกุล" required>
      </div>
      <div class="input-group">
        <input type="email" [(ngModel)]="user.email" name="email" placeholder="อีเมลของคุณ" required>
      </div>
      <div class="input-group">
        <input type="tel" [(ngModel)]="user.phone" name="phone" placeholder="เบอร์โทรศัพท์ (เช่น 0999999999)" required>
      </div>
      <div class="input-group">
        <input type="date" [(ngModel)]="user.dob" name="dob" required 
               style="color: #fff; color-scheme: dark;">
      </div>
      <div class="input-group">
        <input type="password" [(ngModel)]="user.password" name="password" placeholder="รหัสผ่าน" required>
      </div>
      <div class="input-group">
        <input type="password" [(ngModel)]="user.confirmPassword" name="confirmPassword" placeholder="ยืนยันรหัสผ่านอีกครั้ง" required>
      </div>
      
      <button type="submit" [disabled]="isLoading" class="btn-submit">
        {{ isLoading ? 'กำลังประมวลผล...' : 'สมัครสมาชิก' }}
      </button>
    </form>
    
    <div class="register-footer">
      <span>มีบัญชีอยู่แล้วใช่หรือไม่?</span>
      <a routerLink="/login">เข้าสู่ระบบที่นี่</a>
    </div>
    
    <div class="back-home">
      <a routerLink="/">&larr; กลับไปหน้าแรก</a>
    </div>

  </div>
</div>
